name: Scrape Dining Status

on:
  schedule:
    - cron: '*/10 10-23 * * *'
    - cron: '*/10 0-3 * * *'
  workflow_dispatch: {}

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: node scrape-dining-status.js
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
