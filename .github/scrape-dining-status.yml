name: Scrape Dining Status

on:
  schedule:
    # Runs every 10 min, 10:00 UTC - 03:59 UTC (covers ~6am-11pm Eastern, both EDT/EST)
    - cron: '*/10 10-23 * * *'
    - cron: '*/10 0-3 * * *'
  workflow_dispatch: {}

jobs:
  scrape:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: node scrape-dining-status.js
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}